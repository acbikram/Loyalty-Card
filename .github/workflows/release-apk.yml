name: Build Signed APK

# Produces a RELEASE APK signed with this project's persistent upload key, so
# every build installs as an update over the previous one (no uninstall needed).
#
# Requires FOUR repository secrets (uniquely named for this project so they never
# clash with your other repos):
#   LOYALTY_KEYSTORE_BASE64, LOYALTY_KEYSTORE_PASSWORD,
#   LOYALTY_KEY_ALIAS, LOYALTY_KEY_PASSWORD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish the APK as a GitHub Release

jobs:
  build-signed-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper (if missing)
        run: gradle wrapper --gradle-version 8.9

      - name: Decode keystore from secret
        env:
          LOYALTY_KEYSTORE_BASE64: ${{ secrets.LOYALTY_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$LOYALTY_KEYSTORE_BASE64" ]; then
            echo "::error::LOYALTY_KEYSTORE_BASE64 secret is not set for this repo."
            exit 1
          fi
          echo "$LOYALTY_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/release.jks"

      - name: Write keystore.properties
        env:
          LOYALTY_KEYSTORE_PASSWORD: ${{ secrets.LOYALTY_KEYSTORE_PASSWORD }}
          LOYALTY_KEY_ALIAS: ${{ secrets.LOYALTY_KEY_ALIAS }}
          LOYALTY_KEY_PASSWORD: ${{ secrets.LOYALTY_KEY_PASSWORD }}
        run: |
          cat > "$GITHUB_WORKSPACE/keystore.properties" <<EOF
          storeFile=../release.jks
          storePassword=$LOYALTY_KEYSTORE_PASSWORD
          keyAlias=$LOYALTY_KEY_ALIAS
          keyPassword=$LOYALTY_KEY_PASSWORD
          EOF

      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -PappVersionCode=${{ github.run_number }} \
            -PappVersionName=1.0.${{ github.run_number }}

      - name: Locate APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          cp "$APK" "$GITHUB_WORKSPACE/LoyaltyWallet-v1.0.${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoyaltyWallet-release-apk
          path: LoyaltyWallet-v1.0.${{ github.run_number }}.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Loyalty Wallet v1.0.${{ github.run_number }}
          files: LoyaltyWallet-v1.0.${{ github.run_number }}.apk
          body: |
            Signed release APK (versionCode ${{ github.run_number }}).
            Install over any previous build — no uninstall needed (same signing key).
